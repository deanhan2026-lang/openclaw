name: Mantis Scenario

on:
  workflow_dispatch:
    inputs:
      scenario_id:
        description: Mantis scenario id to run
        required: true
        default: discord-status-reactions-tool-only
        type: choice
        options:
          - discord-status-reactions-tool-only
          - discord-thread-reply-filepath-attachment
          - slack-desktop-smoke
          - telegram-live
          - telegram-desktop-proof
          - web-ui-chat-proof
      baseline_ref:
        description: Optional baseline ref for before/after scenarios
        required: false
        default: 0bf06e953fdda290799fc9fb9244a8f67fdae593
        type: string
      candidate_ref:
        description: Candidate ref, tag, or SHA
        required: true
        default: main
        type: string
      pr_number:
        description: Optional PR number to receive QA evidence
        required: false
        type: string

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: mantis-scenario-${{ inputs.scenario_id }}-${{ inputs.pr_number || inputs.candidate_ref || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch selected Mantis workflow
    if: ${{ inputs.scenario_id != 'web-ui-chat-proof' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Dispatch scenario
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_REF: ${{ inputs.baseline_ref }}
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
          PR_NUMBER: ${{ inputs.pr_number }}
          SCENARIO_ID: ${{ inputs.scenario_id }}
        shell: bash
        run: |
          set -euo pipefail

          case "$SCENARIO_ID" in
            discord-status-reactions-tool-only)
              args=(
                workflow run mantis-discord-status-reactions.yml
                --repo "$GITHUB_REPOSITORY"
                --ref main
                -f "baseline_ref=${BASELINE_REF}"
                -f "candidate_ref=${CANDIDATE_REF}"
              )
              if [[ -n "${PR_NUMBER:-}" ]]; then
                args+=(-f "pr_number=${PR_NUMBER}")
              fi
              gh "${args[@]}"
              ;;
            discord-thread-reply-filepath-attachment)
              args=(
                workflow run mantis-discord-thread-attachment.yml
                --repo "$GITHUB_REPOSITORY"
                --ref main
                -f "baseline_ref=${BASELINE_REF:-synthetic-reverted-thread-filepath-fix}"
                -f "candidate_ref=${CANDIDATE_REF}"
              )
              if [[ -n "${PR_NUMBER:-}" ]]; then
                args+=(-f "pr_number=${PR_NUMBER}")
              fi
              gh "${args[@]}"
              ;;
            slack-desktop-smoke)
              args=(
                workflow run mantis-slack-desktop-smoke.yml
                --repo "$GITHUB_REPOSITORY"
                --ref main
                -f "candidate_ref=${CANDIDATE_REF}"
              )
              if [[ -n "${PR_NUMBER:-}" ]]; then
                args+=(-f "pr_number=${PR_NUMBER}")
              fi
              gh "${args[@]}"
              ;;
            telegram-live)
              args=(
                workflow run mantis-telegram-live.yml
                --repo "$GITHUB_REPOSITORY"
                --ref main
                -f "candidate_ref=${CANDIDATE_REF}"
              )
              if [[ -n "${PR_NUMBER:-}" ]]; then
                args+=(-f "pr_number=${PR_NUMBER}")
              fi
              gh "${args[@]}"
              ;;
            telegram-desktop-proof)
              baseline_ref="$BASELINE_REF"
              if [[ -z "$baseline_ref" || "$baseline_ref" == "0bf06e953fdda290799fc9fb9244a8f67fdae593" ]]; then
                baseline_ref="main"
              fi
              args=(
                workflow run mantis-telegram-desktop-proof.yml
                --repo "$GITHUB_REPOSITORY"
                --ref main
                -f "baseline_ref=${baseline_ref}"
                -f "candidate_ref=${CANDIDATE_REF}"
              )
              if [[ -n "${PR_NUMBER:-}" ]]; then
                args+=(-f "pr_number=${PR_NUMBER}")
              fi
              gh "${args[@]}"
              ;;
            web-ui-chat-proof)
              args=(
                workflow run mantis-web-ui-chat-proof.yml
                --repo "$GITHUB_REPOSITORY"
                --ref main
                -f "candidate_ref=${CANDIDATE_REF}"
              )
              if [[ -n "${PR_NUMBER:-}" ]]; then
                args+=(-f "pr_number=${PR_NUMBER}")
              fi
              gh "${args[@]}"
              ;;
            *)
              echo "Unsupported Mantis scenario: ${SCENARIO_ID}" >&2
              exit 1
              ;;
          esac

  authorize_web_ui_chat_actor:
    name: Authorize web UI chat workflow actor
    if: ${{ inputs.scenario_id == 'web-ui-chat-proof' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    outputs:
      authorized: ${{ steps.permission.outputs.authorized }}
    steps:
      - name: Require maintainer-level repository access
        id: permission
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const allowed = new Set(["admin", "maintain", "write"]);
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: context.actor,
            });
            const permission = data.permission;
            core.info(`Actor ${context.actor} permission: ${permission}`);
            if (!allowed.has(permission)) {
              core.notice(
                `Workflow requires write/maintain/admin access. Actor "${context.actor}" has "${permission}".`,
              );
              core.setOutput("authorized", "false");
              return;
            }
            core.setOutput("authorized", "true");

  validate_web_ui_chat_candidate:
    name: Validate web UI chat candidate
    needs: authorize_web_ui_chat_actor
    if: ${{ inputs.scenario_id == 'web-ui-chat-proof' && needs.authorize_web_ui_chat_actor.outputs.authorized == 'true' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    outputs:
      candidate_revision: ${{ steps.validate.outputs.candidate_revision }}
    steps:
      - name: Checkout harness ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate candidate ref is trusted
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

          revision="$(git rev-parse "${CANDIDATE_REF}^{commit}")"
          reason=""
          if git merge-base --is-ancestor "$revision" refs/remotes/origin/main; then
            reason="main-ancestor"
          elif git tag --points-at "$revision" | grep -Eq '^v'; then
            reason="release-tag"
          else
            pr_head_count="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "repos/${GITHUB_REPOSITORY}/commits/${revision}/pulls" \
                --jq '[.[] | select(.state == "open" and .head.repo.full_name == "'"${GITHUB_REPOSITORY}"'" and .head.sha == "'"${revision}"'")] | length'
            )"
            if [[ "$pr_head_count" != "0" ]]; then
              reason="open-pr-head"
            fi
          fi

          if [[ -z "$reason" ]]; then
            echo "Candidate ref '${CANDIDATE_REF}' resolved to ${revision}, which is not trusted for this Mantis run." >&2
            exit 1
          fi

          echo "candidate_revision=${revision}" >> "$GITHUB_OUTPUT"
          {
            echo "candidate: \`${CANDIDATE_REF}\`"
            echo "candidate SHA: \`${revision}\`"
            echo "candidate trust reason: \`${reason}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  run_web_ui_chat_proof:
    name: Run Control UI web chat proof
    needs: [validate_web_ui_chat_candidate]
    if: ${{ inputs.scenario_id == 'web-ui-chat-proof' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 60
    outputs:
      artifact_name: ${{ steps.run_mantis.outputs.artifact_name }}
      output_dir: ${{ steps.run_mantis.outputs.output_dir }}
      proof_status: ${{ steps.run_mantis.outputs.proof_status }}
    steps:
      - name: Checkout harness ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION || '24.x' }}
          install-bun: "true"

      - name: Prepare candidate worktree
        env:
          CANDIDATE_SHA: ${{ needs.validate_web_ui_chat_candidate.outputs.candidate_revision }}
        shell: bash
        run: |
          set -euo pipefail
          worktree_root=".artifacts/qa-e2e/mantis/web-ui-chat-proof-worktrees"
          mkdir -p "$worktree_root"
          git worktree add --detach "$worktree_root/candidate" "$CANDIDATE_SHA"
          pnpm --dir "$worktree_root/candidate" install --frozen-lockfile --prefer-offline

      - name: Run web UI chat proof
        id: run_mantis
        env:
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
          CANDIDATE_SHA: ${{ needs.validate_web_ui_chat_candidate.outputs.candidate_revision }}
        shell: bash
        run: |
          set -euo pipefail

          artifact_name="mantis-web-ui-chat-proof-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_repo="$(pwd)/.artifacts/qa-e2e/mantis/web-ui-chat-proof-worktrees/candidate"
          output_rel=".artifacts/qa-e2e/mantis/web-ui-chat-proof"
          root="$candidate_repo/$output_rel"
          mkdir -p "$root"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "output_dir=${root}" >> "$GITHUB_OUTPUT"

          install -D -m 0644 \
            "${GITHUB_WORKSPACE}/ui/src/e2e/mantis-chat-proof.e2e.test.ts" \
            "$candidate_repo/ui/src/e2e/mantis-chat-proof.e2e.test.ts"
          install -D -m 0644 \
            "${GITHUB_WORKSPACE}/ui/src/test-helpers/control-ui-e2e.ts" \
            "$candidate_repo/ui/src/test-helpers/control-ui-e2e.ts"

          cd "$candidate_repo"
          node scripts/ensure-playwright-chromium.mjs

          set +e
          OPENCLAW_MANTIS_WEB_UI_CHAT_OUTPUT_DIR="$root" \
            node scripts/run-vitest.mjs run \
              --config test/vitest/vitest.ui-e2e.config.ts \
              --configLoader runner \
              ui/src/e2e/mantis-chat-proof.e2e.test.ts \
            2>&1 | tee "$root/vitest.log"
          vitest_exit="${PIPESTATUS[0]}"
          set -e

          proof_status="pass"
          if [[ "$vitest_exit" -ne 0 ]]; then
            proof_status="fail"
          fi
          echo "proof_status=${proof_status}" >> "$GITHUB_OUTPUT"

          node "${GITHUB_WORKSPACE}/scripts/mantis/build-web-ui-chat-evidence.mjs" \
            --output-dir "$root" \
            --candidate-ref "$CANDIDATE_REF" \
            --candidate-sha "$CANDIDATE_SHA" \
            --status "$proof_status"

          cat "$root/mantis-report.md" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$vitest_exit" -ne 0 ]]; then
            exit "$vitest_exit"
          fi

      - name: Upload Mantis web UI chat artifacts
        if: ${{ always() && steps.run_mantis.outputs.output_dir != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.run_mantis.outputs.artifact_name }}
          path: ${{ steps.run_mantis.outputs.output_dir }}
          retention-days: 14
          if-no-files-found: error

  publish_web_ui_chat_evidence:
    name: Publish Mantis web UI chat evidence
    needs: [run_web_ui_chat_proof]
    if: ${{ always() && inputs.scenario_id == 'web-ui-chat-proof' && inputs.pr_number != '' && needs.run_web_ui_chat_proof.outputs.artifact_name != '' }}
    runs-on: ubuntu-24.04
    environment: qa-live-shared
    steps:
      - name: Checkout harness ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Download Mantis web UI chat artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.run_web_ui_chat_proof.outputs.artifact_name }}
          path: .artifacts/qa-e2e/mantis/web-ui-chat-proof

      - name: Create Mantis GitHub App token
        id: mantis_app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.MANTIS_GITHUB_APP_ID }}
          private-key: ${{ secrets.MANTIS_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Comment PR with inline QA evidence
        env:
          GH_TOKEN: ${{ steps.mantis_app_token.outputs.token }}
          MANTIS_ARTIFACT_R2_ACCESS_KEY_ID: ${{ secrets.MANTIS_ARTIFACT_R2_ACCESS_KEY_ID }}
          MANTIS_ARTIFACT_R2_BUCKET: openclaw-crabbox-artifacts
          MANTIS_ARTIFACT_R2_ENDPOINT: ${{ vars.MANTIS_ARTIFACT_R2_ENDPOINT }}
          MANTIS_ARTIFACT_R2_PUBLIC_BASE_URL: https://artifacts.openclaw.ai
          MANTIS_ARTIFACT_R2_REGION: auto
          MANTIS_ARTIFACT_R2_SECRET_ACCESS_KEY: ${{ secrets.MANTIS_ARTIFACT_R2_SECRET_ACCESS_KEY }}
          REQUEST_SOURCE: mantis-scenario-proof-shim
          TARGET_PR: ${{ inputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e/mantis/web-ui-chat-proof"
          if [[ ! -f "$root/mantis-evidence.json" ]]; then
            echo "No Mantis evidence manifest found; skipping PR evidence comment."
            exit 0
          fi
          node scripts/mantis/publish-pr-evidence.mjs \
            --manifest "$root/mantis-evidence.json" \
            --target-pr "$TARGET_PR" \
            --artifact-root "mantis/web-ui-chat-proof/pr-${TARGET_PR}/run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --marker "<!-- mantis-web-ui-chat-proof -->" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --request-source "$REQUEST_SOURCE"
